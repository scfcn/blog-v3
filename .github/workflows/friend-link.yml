name: Friend Link Manager

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MY_SITE_URL: 'https://www.qixz.cn/'
  FEEDS_FILE: app/feeds.ts

permissions:
  issues: write
  contents: write

jobs:
  process-friend-link:
    runs-on: ubuntu-latest
    if: startsWith(github.event.label.name, 'friend-link/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Get pnpm store
        id: pnpm-cache
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Parse Issue
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ACTOR: ${{ github.actor }}
          OWNER: ${{ github.repository_owner }}
          LABEL: ${{ github.event.label.name }}
        run: node scripts/friend-link-parse.mjs

      - name: Run Check
        id: check
        run: node scripts/friend-link-check.mjs

      - name: Process Result
        id: process
        env:
          LABEL: ${{ github.event.label.name }}
        run: |
          CHECK_RESULT=$(cat check-result.json)
          ACTION=$(echo "$CHECK_RESULT" | jq -r '.action')
          ALL_PASSED=$(echo "$CHECK_RESULT" | jq -r '.allPassed')
          REQUIRES_REVIEW=$(echo "$CHECK_RESULT" | jq -r '.requiresReview')
          LABEL="$LABEL"

          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT
          echo "requires_review=$REQUIRES_REVIEW" >> $GITHUB_OUTPUT

      - name: Auto Approve for Owner
        id: auto_owner
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ github.repository_owner }}
        if: env.ACTOR == env.OWNER && (steps.process.outputs.all_passed == 'true' || steps.process.outputs.action == 'remove')
        run: |
          echo "auto_approved=true" >> $GITHUB_OUTPUT

      - name: Execute Action
        id: execute
        if: steps.process.outputs.all_passed == 'true' || steps.auto_owner.outputs.auto_approved == 'true'
        env:
          ACTION: ${{ steps.process.outputs.action }}
        run: node scripts/friend-link-action.mjs

      - name: Create Comment & Update Status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('check-result.json', 'utf8'));
            const action = '${{ steps.process.outputs.action }}';
            const allPassed = '${{ steps.process.outputs.all_passed }}' === 'true';
            const autoApproved = '${{ steps.auto_owner.outputs.auto_approved }}' === 'true';
            const requiresReview = '${{ steps.process.outputs.requires_review }}' === 'true';

            const emoji = (s) => s === 'pass' ? '✅' : s === 'fail' ? '❌' : s === 'warn' ? '⚠️' : '⏭️';

            let body = `## 🔍 友链处理结果\n\n`;
            body += `| 检测项 | 状态 | 详情 |\n|--------|------|------|\n`;

            if (action === 'add') {
              body += `| 站点连通性 | ${emoji(result.siteConnectivity?.status)} | ${result.siteConnectivity?.message || '-'} |\n`;
              body += `| 友链互链 | ${emoji(result.linkBack?.status)} | ${result.linkBack?.message || '-'} |\n`;
              body += `| 头像有效性 | ${emoji(result.avatarValid?.status)} | ${result.avatarValid?.message || '-'} |\n`;
              body += `| 技术架构 | ${emoji(result.archsValid?.status)} | ${result.archsValid?.message || '-'} |\n`;
            } else if (action === 'update') {
              body += `| 身份验证 | ${emoji(result.identity?.status)} | ${result.identity?.message || '-'} |\n`;
              body += `| 站点连通性 | ${emoji(result.siteConnectivity?.status)} | ${result.siteConnectivity?.message || '-'} |\n`;
              body += `| 头像有效性 | ${emoji(result.avatarValid?.status)} | ${result.avatarValid?.message || '-'} |\n`;
              body += `| 技术架构 | ${emoji(result.archsValid?.status)} | ${result.archsValid?.message || '-'} |\n`;
            } else if (action === 'remove') {
              body += `| 身份验证 | ${emoji(result.identity?.status)} | ${result.identity?.message || '-'} |\n`;
            }

            body += `\n`;

            if (allPassed || autoApproved) {
              body += `> ✅ 处理完成，友链已${action === 'add' ? '添加' : action === 'update' ? '更新' : '移除'}\n`;

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'completed'
              });

              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'friend-link/add'
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'friend-link/update'
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'friend-link/remove'
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['friend-link/passed']
              });
            } else if (requiresReview) {
              body += `> ⚠️ 需要人工审核\n`;
              body += `> \n`;
              body += `> 请仓库所有者确认后：\n`;
              body += `> - 打上 \`friend-link/passed\` 标签以通过\n`;
              body += `> - 打上 \`friend-link/rejected\` 标签以拒绝\n`;
            } else {
              body += `> ❌ 检测未通过\n`;

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }

            body += `\n---\n*由 GitHub Actions 自动生成*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Handle Rejection
        if: github.event.label.name == 'friend-link/rejected'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'friend-link/rejected'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '> ❌ 友链申请已被拒绝\n\n---\n*由 GitHub Actions 自动生成*'
            });

      - name: Handle Passed Label Removed (Revoke)
        if: github.event.action == 'unlabeled' && github.event.label.name == 'friend-link/passed'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('check-result.json', 'utf8'));

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const isAdd = issue.labels.some(l => l.name === 'friend-link/add');

            if (isAdd && result.data?.link) {
              const action = 'remove';
              const { execSync } = require('child_process');

              execSync(`node scripts/friend-link-action.mjs`, {
                env: { ...process.env, ACTION: action }
              });
            }
